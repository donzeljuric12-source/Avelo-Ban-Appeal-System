<!DOCTYPE html>
<html>
<head>
  <title>Avelo Ban Appeal System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated glow background */
    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(88,101,242,0.15), transparent 60%);
      animation: move 12s linear infinite;
      z-index: 0;
    }

    @keyframes move {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      background: #11131a;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 0 30px rgba(88,101,242,0.25);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      background: rgba(88,101,242,0.2);
      border: 1px solid #5865f2;
      border-radius: 6px;
      font-size: 10px;
      margin-bottom: 10px;
    }

    h2 {
      text-align: center;
      margin-bottom: 5px;
      color: #5865f2;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1c1f2b;
      color: white;
      outline: none;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      box-shadow: 0 0 0 2px #5865f2;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #5865f2;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4752c4;
      transform: scale(1.03);
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="badge">OFFICIAL SYSTEM</div>

  <h2>Avelo Ban Appeal System</h2>
  <div class="subtitle">Submit your appeal for review</div>

  <form action="https://formsubmit.co/donzeljuric12@gmail.com" method="POST">

    <input type="text" name="Discord Username" placeholder="Discord Username" required>

    <input type="text" name="Discord User ID" placeholder="Discord User ID" required>

    <textarea name="Reason for ban" placeholder="Why you got banned?" required></textarea>

    <textarea name="Appeal" placeholder="Why should you get unbanned?" required></textarea>

    <button type="submit">Submit Appeal</button>

  </form>

  <div class="footer">
    Avelo Ban Appeal System
  </div>

</div>

</body>
</html>
